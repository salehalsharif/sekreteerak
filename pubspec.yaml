name: sekreteerak
description: سَكرتيرك — مساعدك الشخصي الصوتي لإدارة المهام والمواعيد والمتابعات
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Supabase
  supabase_flutter: ^2.5.0

  # Audio & Speech
  record: ^5.1.0
  speech_to_text: ^6.6.0
  audioplayers: ^6.0.0

  # Notifications
  flutter_local_notifications: ^17.2.0

  # UI
  google_fonts: ^6.2.0
  lottie: ^3.1.0
  table_calendar: ^3.1.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.5.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  http: ^1.2.1
  json_annotation: ^4.9.0
  url_launcher: ^6.2.5
  permission_handler: ^11.3.1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.7.1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/lottie/
    - assets/images/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-ExtraBold.ttf
          weight: 800
